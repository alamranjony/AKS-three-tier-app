services:
  backend:
    build:
      context: ./backend
    container_name: devops-backend
    restart: unless-stopped
    ports:
      - "8080:8080"   # Backend accessible on host for curl tests
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnet

  frontend:
    build:
      context: ./frontend
    container_name: devops-frontend
    restart: unless-stopped
    ports:
      - "3000:80"     # Frontend served on host port 3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devnet

networks:
  devnet:
    driver: bridge
